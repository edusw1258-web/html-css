<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente com CSS</title>
    <style>

        * { /* Seletor universal das CSS*/
            height: 100%;
        }

        body { /* Cria um gradiente que forma o efeito degrade na página */
            background-image: linear-gradient(to right, #5521DE, #0A13E0);
        }

    </style>
</head>
<body>
    <h1>Testando gradiente</h1>
</body>
</html>
