<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="inum">Número: </label>
            <!-- O 'type="range"' cria um campo para selecionar um valor numérico dentro de um intervalo -->
            <!-- O 'oninput' serve para executar uma função ao mudar o 'input'. Nessa caso, o 'ival' será atualizado com o valor de 'inum'. toda vez que o usuário o alterar -->
            <input type="range" name="num" id="inum" min="0" max="10" value="5" oninput="ival.innerHTML = Number(inum.value)">
            <!-- O 'output' cria um campo para exibir o resultado do cálculo. Ele não é editável pelo usuário. Nesse caso, sempre irá exibir o valor 5 -->
            <output id="ival">5</output>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
