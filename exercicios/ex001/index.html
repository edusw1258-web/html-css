<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro exercício</title>
    <link rel="shortcut icon" href="icon/favicon-32x32.png" type="image/x-icon">
    <style>

        body {
            font-family: Arial, sans-serif; 
            background-color: #f0f0f0;
            margin: 20px; /* Espaçamento ao redor do conteúdo */
            padding: 20px; /* Espaçamento entre o conteúdo e a margem*/
            min-height: 100vh; /* Garante que o 'body' ocupe toda a altura da viewport */
            display: flex; /* Essa ajuda a controlar o posicionameto dos elementos, por padrão, horizontalmente e a esquerda */
            flex-direction: column; /* Organiza os elementos verticalmente */
        }

        p {
            color: #797575;
            line-height: 1.6; /* Melhorar a legibilidade do texto, deixando um maior espaçamento entre linhas e letras */
            overflow: hidden; /* Garantir que o texto não flua ao redor da imagem */
        }

        img {
            float: left; /* Faz com que a imagem fique a esquerda e o texto a direita */
            width: 180px; /* Muda o tamanho da imagem para se encaixar melhor com o texto */
            margin: 0 20px 10px 0; /* Espaçamento entre a imagem e o texto */
        }

        footer {
            margin-top: auto; /* Espaçamento entre o 'footer' e o 'main', precisa do 'min-height:100vh', 'display:flex' e 'flex-direction:column para funcionar */
            text-align: center; 
        }

        footer p {
            font-style: italic;
            color: #777;
            font-size: 14px;
        }

    </style>
</head>
<body>
    <main>
        <img src="imagens/HTML5_Logo_512 (1).png" alt="Logo HTML5">
        <h1>Olá, mundo!</h1>
        <hr>
        <p>Estou muito feliz em estar editando meu primeiro documento HTML!</p>
        <p>Um momento único! Estou criando meu primeiro site.</p>
    </main>
    <footer>
        <p>&copy; Gabriel Eduardo</p>  
    </footer>
</body>
</html>
