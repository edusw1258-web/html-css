<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <link rel="shortcut icon" href="icon/favicon-32x32 copy.png" type="image/x-icon">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(66, 176, 226);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            color: #000000; /* Cor não aparece porque foi sobrescrita pela cor da  'a:visited' */
            text-decoration: none; /* Remove o sublinhado e qualquer outra decoração do link*/
            font-weight: bold;
        }

        
        a:visited { /* Pseudo-classe que muda a cor da fonte se o site já foi visitado */
            color: rgb(214, 3, 3)
        }
        
        a:hover { /* Pseudo-classe que muda a cor da fonte quando o mouse passa por cima do link */
            color: rgb(116, 116, 116);
            text-decoration: underline; /* Adiciona um sublinhado ao passar o mouse por cima do link */
        }
        
        a:active { /* Pseudo-classe que muda a cor quando o link é clicado */
            color: rgb(255, 251, 5);
        }

        .especial { /* Seleciona o link com a classe "especial" */
            background-color: rgb(0, 0, 0); /* Muda a cor de fundo do link com a classe "especial" */
        }
        
        a::after { /* Pseudo-elemento que adiciona um conteúdo depois do link */
            content: '[link]'; /* Adiciona conteudo depois do link. Nesse caso, o conteúdo será "[link]" */
            text-decoration: none; /* Remove o sublinhado e qualquer outra decoração do link */
            font-weight: normal;
            color: rgb(245, 39, 2);
        }    
        
        .especial::after { /* Pseudo-elemento que adiciona um conteúdo depois do link com a classe "especial" */
            content: '[link]'; /* Adiciona conteudo depois do link. Nesse caso, o conteúdo será "[link especial]" */
            text-decoration: none; /* Remove o sublinhado e qualquer outra decoração do link */
            font-weight: normal;
            color: rgb(245, 39, 2);
        }

        footer {
            margin-top: auto;
        }

        footer > p {
            text-align: center;
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório do Github</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" class="especial" target="_blank">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do Curso em Vídeo</a></li>
    </ul>
    <footer>
        <p>&copy; Gabriel Eduardo</p>
    </footer>
</body>
</html>
