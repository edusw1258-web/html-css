<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com o Google Fonts</title>
    <link rel="shortcut icon" href="icon/favicon-32x32 copy.png" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            font-family: 'Work Sans', Arial, Helvetica, sans-serif;
            font-size: 16px;
            background-color: darkgray;
            color: black;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Bodoni Moda', serif;
        }

        footer {
            margin-top: auto;
        }

        footer p {
            font-size: 14px;
            font-style: italic;
            text-align: center;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Sunt eaque magni reiciendis obcaecati, ea at enim sapiente velit, ratione perferendis facilis explicabo expedita architecto numquam quisquam unde, temporibus voluptate ut.</p>
    <footer>
        <p>&copy; Gabriel Eduardo</p>
    </footer>
</body>
</html>
