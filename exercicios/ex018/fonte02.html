<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>

        /* '@font-face permite que fontes externas ou desconhecidas sejam aceitas nas CSS */
        @font-face {
            font-family: 'gotic'; /* Nome da fonte */
            src: url('gotic ween.ttf') /* Caminho para o arquivo da fonte */ 
            format('truetype'); /* Informa o formato da fonte */
            font-weight: normal;
            font-style: normal;
        }
        
        body {
            font-family: 'gotic', 'Arial', Helvetica, sans-serif;
            font-size: 16px;
            color: black;
        }

        h1 {
            font-family: 'gotic', 'Times New Roman', Times, serif;
            font-weight: normal;
        }

    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptates beatae minima totam libero excepturi! Suscipit odio quas expedita eveniet voluptates! Quia debitis saepe quibusdam ducimus suscipit nobis explicabo reiciendis officiis.</p>
</body>
</html>
