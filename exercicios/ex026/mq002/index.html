<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query Media Feature</title>
    <!-- 'media' é  o atributo que define o tipo de Media Query que será usada-->
    <!-- O 'all' significa que o estilo vai ser aplicado em todos os dispositivos -->
    <link rel="stylesheet" href="estilos/style.css" media="all">
    <!-- O 'screen' é a Media Type que define que o estilo vai ser aplicado em dispositivos com tela -->
    <!-- O 'orientation' é a Media Feature que define a orientação do dispositivo, podendo ser 'portrait' ou 'landscape' -->
    <!-- O media type vai entre aspas e o media feature vai entre parenteses -->
    <link rel="stylesheet" href="estilos/vertical.css" media="screen and (orientation: portrait)">
    <link rel="stylesheet" href="estilos/horizontal.css" media="screen and (orientation: landscape)">
</head>
<body>
    <h1>Mude a orientação do seu dispositivo</h1>
</body>
</html>
