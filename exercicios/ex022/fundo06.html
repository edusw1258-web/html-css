<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamanhos da Imagem</title>
    <style>

        body {
            height: 100vh;
            background-color: black;
            background-image: url(imagens/wallpaper002.jpg);
            background-position: center center; /* Centraliza a imagem. */
            background-repeat: no-repeat; /* Não repete a imagem. Nesse caso, só irá aparecer a imagem na posição que foi definida. */
            background-size: cover /* Faz com que a imagem ocupe toda a tela mas suas bordas são removidas ao depender do tamanho da tela */
        }

        main {
            background-color: white;
            width: 400px;
            padding: 10px;
            margin: auto;
            border: 1px solid darkgreen;
            border-radius: 15px;
        }

    </style>
</head>
<body>
    <main>
        <h1>Testando imagem de fundo em sites</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Cum nobis unde officiis libero consequuntur similique nam omnis repudiandae natus quis labore ipsum suscipit tempore quibusdam, eos dolores? Esse, ad sed!</p>
    </main>
</body>
</html>
