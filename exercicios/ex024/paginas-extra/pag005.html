<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <style>
        body {
            background-color: aquamarine;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <!-- Chamando a função 'clicou' -->
    <a href="#" onclick="clicou()">Clique em mim!</a>
    <div id="saida"></div>

    <!-- Definindo uma função chamada 'clicou' -->
     <script>
        function clicou() {
            // Pegando o elemento com o id 'saida' e armazenando na variável 's'
            s = document.getElementById('saida'); 
            // Modificando o conteúdo HTML do elemento 's' para exibir a mensagem de agradecimento
            s.innerHTML = '<p>Obrigado por clicar!</p>'; 
        }
     </script>
</body>
</html>
