<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrupando Colunas</title>
    <link rel="shortcut icon" href="icon/favicon-32x32 copy.png" type="image/x-icon">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bold;
            padding: 10px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        col.cname {
            background-color: lightcoral;
        }

        col.cgroup {
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <h1>Exercício de Tabelas</h1>

    <table>
        <caption>Cadastro</caption>

        <!-- A tag 'colgroup' permite referenciar um conjunto de colunas -->
        <colgroup>
            <col class="cname">
            <col class="cgroup" span="2">
        </colgroup>

        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissao</th>
        </tr>

        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>26</td>
            <td>Jornalista</td>
        </tr>

        <tr>
            <td>Zezinho da Golméia</td>
            <td>M</td>
            <td>35</td>
            <td>Agricultor</td>
        </tr>

        <tr>
            <td>Tia Teteia</td>
            <td>F</td>
            <td>58</td>
            <td>Professora</td>
        </tr>

        <tr>
            <td>Boris Scalovisk</td>
            <td>M</td>
            <td>44</td>
            <td>Militar</td>
        </tr>

        <tr>
            <td>Coxinha da Silva</td>
            <td>M</td>
            <td>42</td>
            <td>Comediante</td>
        </tr>

        <tr>
            <td>Doquinha da Silva</td>
            <td>M</td>
            <td>40</td>
            <td>Ator</td>
        </tr>
    </table>
</body>
</html>
