<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="html.ico" type="image/x-icon">
    <title>Teste de favicon</title>
    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: bisque;
            flex-direction: column;
            display: flex;
            min-height: 100vh;
        }

        p {
            font-size: 18px;
            font-family:Georgia, 'Times New Roman', Times, serif;
            color: rgb(34, 29, 34);
        }

        a {
            color: rgb(34, 29, 34);
        }

        /* Pseudo-classes que muda a cor da fonte quando o link já foi visitado */
         a:visited {
            color: rgb(29, 6, 131);
        }

        /* Pseudo-classes que muda a cor da fonte quando o mouse passa por cima do link */
        a:hover {
            color: rgb(187, 64, 6);
        }

        footer {
            text-align: center;
            margin-top: auto;
            font-size: 14px;
            color: gray;
        }

        footer p {
            font-size: 12px;
            font-style: italic;
            color: darkgray;
            margin: 0;
        }
        
    </style>
</head>
<body>
    <h1>Olha o favicon aqui em cima</h1>
    <p>Para acessar o repositório gratuito de <em>icons</em> clique aqui <a href="https://www.iconarchive.com/" target="_blank">www.iconarchive.com</a></p>
</body>
<footer>
    <p>&copy; Gabriel Eduardo</p>
</footer>
</html>
