<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com imagens</title>
    <link rel="shortcut icon" href="icon/favicon-32x32.png" type="image/x-icon">
    <style>

        body {
            font: 1em sans-serif;
            background-color: rgb(162, 165, 4);
            text-align: center;
        }

        h1 {
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        p {
            color: rgb(121, 58, 58);
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        .logohtml {
            display: flex; /* Permite ontrolar o posicionameto dos elementos ('main', 'div', 'footer', etc.) */
            margin: 10px auto;
        }

        .logocss {
            display: flex;
            margin: 10px auto;
        }

        .logojs {
            display: flex;
            margin: 50px auto;
            width: 300px;
            height: auto;
        }

        footer p {
            color: white;
            font-size: 0.8em;
            margin-top: auto;
        }
        
        footer p {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-style: italic;

        }

    </style>
</head>
<body>
    <h1>Testando carga e imagens</h1>
    <p>Abaixo você verá uma imagem:</p>
    <img class="logohtml" src="imagens/logohtml200.png" alt="Logo HTML5"><br><hr>
    <p>Podemos também carregar imagens que estão em sub-pastas</p>
    <img class="logocss" src="logocss3200.jpg" alt="Logo CSS3"><br><hr>
    <p>Também podemos carregar imagens externas</p>
    <img class="logojs" src="https://brandlogovector.com/wp-content/uploads/2020/07/JavaScript-Logo-Small.png" alt="Logo JavaScript"><br>
    <footer>
        <p>&copy; Gabriel Edaurdo</p>
    </footer>
</body>
</html>
