<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 001</title>
    <style>

        body {
            background-color: blanchedalmond;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            display: flex;
            min-height: 100vh;
            flex-direction: column;
        }

        h1 {
            margin: 20px;
            padding: 20px;
            border: 10px solid rgb(59, 35, 8);
        }

        section {
            margin: 10px;
            padding: 10px;
        }

        footer {
            margin: auto;
        }

        footer p {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-style: italic;
            color: rgb(167, 163, 163);
            text-align: center;
        }

    </style>
</head>
<body>
    <h1>Quebra de linhas</h1>
    <section>
        <p>*um</p>
        <p>**dois</p>
        <p>***três</p>
        <p>****quatro</p><br>
        <p>****quatro</p>
        <p>***três</p>
        <p>***dois</p>
        <p>*um</p>
    </section>
    <footer>
        <p>&copy; Gabriel Eduardo</p>
    </footer>
</body>
</html>
