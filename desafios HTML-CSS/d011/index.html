<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralizando Imagens</title>
    <style>

        #container {
            background-image: url(imagens/espaco.jpg);
            background-size: 100% 100%; /* Faz com que a imagem ocupe toda a tela. Usado para que a imagem não se repita */
            height: 94vh;
            padding: 10px;
            position: relative; /* Se alinha conforme o fuxo da página.Serve como referência para o 'conteudo' se alinhar */
        }

        #conteudo {
            background-image: url(imagens/astronauta.png);
            background-size: 100% 100%;
            height: 200px;
            width: 400px;
            position: absolute; /* Se alinha em relação ao 'container' */

            /* Se alinha conforme o fuxo da página. Por padrão, o alinhamento começa no canto superior esquerdo deste conteiner. Ou seja, este lado é que estará no centro do alinhamento */
            top: 50%;
            left: 50%;

            /* Ajusta o alinhamento ao centro da página. Essa parte complementa o 'top' e 'left'. Posições negativas se movem para cima e para a esquerda e posições positivas se movem para baixo e para a direita */
            transform: translate(-50%, -50%);
        }

    </style>
</head>
<body>
    <section id="container">
        <article id="conteudo"></article>
    </section>
</body>
</html>
