<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo 01</title>
    <style>

        body {
            text-align: center;
            background-color: rgb(99, 61, 61);
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: white;
            text-decoration: none;
        }

        .p1 {
            color: white;
        }

        /* Este é o elemento interiro, imagem + texto*/
        .botao-img {
            display: inline-flex; /* Ativa o flex mas deixa o elemento do tipo inline */
            flex-direction: column;
            align-items: center;
            gap: 8px; /* Espaço entre a imagem e o texto */
            padding: 6px 8px;
            color: rgb(241, 235, 235);           
            text-decoration: none;
            border-radius: 6px;
            
        }

        /* Este é somenete a imagem que está dentro de 'botao-img'*/
        .botao-img img {
            display: block;
            color: black;
        }

        /* Altera fontes e cores do texto do link */
        .linkext {
        color: rgb(255, 255, 255);
        font-weight: bold;
        text-decoration: underline;
        }

        .botao-img span {
        color: rgb(2, 2, 2);
        }

    </style>
</head>
<body>
     <iframe width="580" height="400" src="https://www.youtube.com/embed/Ejkb_YpuHWs?si=1_vxFCQwo8U4dzJA" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <p><a href="https://www.youtube.com/playlist?list=PLHz_AreHm4dkZ9-atkcmcBaMZdmLHft8n" target="_blank" class="linkext">Clique aqui para saber mais</a></p>
    <a href="d009.html" class="botao-img">
        <img width="80" src="https://cdn-icons-png.flaticon.com/512/93/93634.png" alt="">
        <span>Voltar</span>
    </a>
</body>
</html>
