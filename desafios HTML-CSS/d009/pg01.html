<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo 01</title>
    <style>

        body {
            text-align: center;
            background-color: rgb(99, 61, 61);
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* A 'div' inteira */
        .video {
            width: 80%; /* Ocupa 80% da tela */
            max-width: 580px; /* Ocupa no máximo 580px */
            margin: 0 auto; /* O 'auto' centraliza a 'div' horizontalmente e o 0 reitira a margem de cima e de baixo */
        }

        /* A 'iframe' dentro da 'div' */
        .video iframe {
            width: 100%; /* Ocupa 100% da largura da 'div', que é sua 'div pai' */
            aspect-ratio: 16/9; /* Mantém a proporção 16:9 do vídeo */
            height: auto; /* Adapta a altura automaticamente para manter a proporção de 16:9 */
        }

        a {
            color: white;
            text-decoration: none;
        }

        .p1 {
            color: white;
        }

        /* Este é o elemento interiro, imagem + texto*/
        .botao-img {
            display: inline-flex; /* Ativa o flex mas deixa o elemento do tipo inline */
            flex-direction: column;
            align-items: center;
            gap: 8px; /* Espaço entre a imagem e o texto */
            padding: 6px 8px;
            color: rgb(241, 235, 235);           
            text-decoration: none;
            border-radius: 6px;
            
        }

        /* Este é somenete a imagem que está dentro de 'botao-img'*/
        .botao-img img {
            display: block;
            color: black;
        }

        /* Altera fontes e cores do texto do link */
        .linkext {
        color: rgb(255, 255, 255);
        font-weight: bold;
        text-decoration: underline;
        }

        .botao-img span {
        color: rgb(2, 2, 2);
        }

        footer {
            margin: auto;
            text-align: center;
        }

        footer p {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-style: italic;
        }

    </style>
</head>
<body>
     <div class="video"><iframe width="580" height="400" src="https://www.youtube.com/embed/Ejkb_YpuHWs?si=1_vxFCQwo8U4dzJA" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div>
    <p><a href="https://www.youtube.com/playlist?list=PLHz_AreHm4dkZ9-atkcmcBaMZdmLHft8n" target="_blank" class="linkext">Clique aqui para saber mais</a></p>
    <a href="d009.html" class="botao-img">
        <img width="80" src="https://cdn-icons-png.flaticon.com/512/93/93634.png" alt="">
        <span>Voltar</span>
    </a>
    <footer>
        <p>&copy; Gabriel Eduardo</p>
    </footer>
</body>
</html>
