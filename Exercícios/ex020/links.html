<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: #1beb00; /* Cor não aparece porque foi sobrescrita pela cor da  'a:visited' */
            text-decoration: none; /* Remove o sublinhado e qualquer outra decoração do link*/
            font-weight: bold;
        }

        a:hover { /* Cor que aparce quado o mouse passa por cima do link, está também é sobrescrita por 'a:visited' */
            color: rgb(27, 26, 26);
            text-decoration: underline;
        }

        a:visited { /* Muda a cor da fonte se o site já foi visitado */
            color: rgb(183, 0, 255)
        }

        a:active { /* Muda a cor quando o link é clicado */
            color: rgb(255, 251, 5);
        }

        .especial { /* Seleciona o link com a classe "especial" e muda sua cor */
            background-color: rgb(0, 255, 98);
        }

        a::after { /* Pseudo-elemento que adiciona um conteúdo depois do link */
            content: '[link]'; /* Adiciona conteudo depois do link. Nesse caso, o conteúdo será "[link]" */
            text-decoration: none;
            font-weight: normal;
            color: rgb(245, 39, 2);
        }
        
    </style>
</head>

<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório do Github</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" class="especial" target="_blank">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do Curso em Vídeo</a></li>
    </ul>
</body>

</html>
