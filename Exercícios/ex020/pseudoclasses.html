<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>

        div {
            display: inline-block;
            /* Essa ajuda a controlar o posicionamento */
            background-color: aqua;
            border: 1px solid black;
            /* Adiciona uma borda */
            text-align: center;
            /* Centra o texto */
            height: 200px;
            /* Altera a altura */
            width: 200px;
            /* Altera a largura */
        }

        div:hover {
            background-color: red;
        }
        
    </style>
</head>

<body>
    <div>01</div>
    <div>02</div>
    <div>03</div>
</body>

</html>
